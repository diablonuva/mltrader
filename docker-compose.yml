# ---------------------------------------------------------------------------
# Pi 5 (8 GB) deployment.
# mem_limit removed — Pi 5 kernel does not enable cgroup memory by default.
# To re-enable memory limits later:
#   sudo nano /boot/firmware/cmdline.txt
#   Append (same line, space-separated): cgroup_enable=memory cgroup_memory=1
#   sudo reboot
# ---------------------------------------------------------------------------

services:
  trader:
    build: .
    container_name: mltrader-engine
    env_file: .env
    volumes:
      - ./src:/app/src:ro           # live-mount source — git pull + restart picks up changes
      - ./config:/app/config:ro    # live-mount config — no rebuild needed for yaml changes
      - ./main.py:/app/main.py:ro  # live-mount entrypoint
      - ./logs:/app/logs
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped
    cpuset: "0,1"                  # Pin to CPU cores 0-1 (thermal isolation)
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('logs') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s            # give main.py 60s to initialise before health checks begin

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dashboard
    container_name: mltrader-dashboard
    env_file: .env
    environment:
      - NODE_ENV=production
      - LOGS_DIR=/app/logs          # Next.js API routes read shared_state.json from here
    ports:
      - "8501:3000"                 # external :8501 stays the same — internal Next.js runs on :3000
    volumes:
      - ./logs:/app/logs:ro         # shared with trader — includes shared_state.json and trades.log
    depends_on:
      trader:
        condition: service_started
    restart: unless-stopped
    cpuset: "2,3"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
